<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Knowledge Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pitch: #c8a96e;
    --pitch-dark: #8b6914;
    --green: #1a4a2e;
    --green-mid: #2d6e46;
    --green-light: #4a9c6b;
    --cream: #f5edd8;
    --red: #c0392b;
    --red-bright: #e74c3c;
    --white: #fdfaf4;
    --ink: #1a1208;
    --shadow: rgba(0,0,0,0.35);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--green);
    font-family: 'DM Sans', sans-serif;
    color: var(--white);
    overflow-x: hidden;
  }

  /* Pitch texture background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.015) 0px,
        rgba(255,255,255,0.015) 1px,
        transparent 1px,
        transparent 80px
      ),
      repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.015) 0px,
        rgba(255,255,255,0.015) 1px,
        transparent 1px,
        transparent 80px
      );
    pointer-events: none;
    z-index: 0;
  }

  /* Cricket ball decoration */
  .ball-deco {
    position: fixed;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #e74c3c, #8b0000);
    opacity: 0.07;
    z-index: 0;
    pointer-events: none;
  }
  .ball-deco:nth-child(1) { width: 320px; height: 320px; top: -80px; right: -80px; }
  .ball-deco:nth-child(2) { width: 180px; height: 180px; bottom: 60px; left: -50px; }

  .container {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.7s ease both;
  }

  .badge {
    display: inline-block;
    background: var(--pitch);
    color: var(--ink);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 6px 18px;
    border-radius: 2px;
    margin-bottom: 18px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 7vw, 4rem);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -1px;
    color: var(--white);
  }

  h1 span {
    color: var(--pitch);
  }

  .subtitle {
    margin-top: 14px;
    font-size: 15px;
    color: rgba(255,255,255,0.55);
    font-weight: 300;
    letter-spacing: 0.3px;
  }

  /* Score bar */
  .scoreboard {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 16px 24px;
    margin-bottom: 36px;
    backdrop-filter: blur(4px);
    animation: fadeDown 0.7s 0.1s ease both;
  }

  .score-item { text-align: center; }
  .score-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
  .score-value { font-family: 'Playfair Display', serif; font-size: 1.7rem; font-weight: 700; color: var(--pitch); }
  .score-divider { width: 1px; height: 40px; background: rgba(255,255,255,0.1); }

  /* Progress */
  .progress-wrap {
    margin-bottom: 32px;
    animation: fadeDown 0.7s 0.15s ease both;
  }
  .progress-bar-bg {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-light), var(--pitch));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* Question card */
  .question-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 12px;
    padding: 36px 36px 28px;
    margin-bottom: 24px;
    backdrop-filter: blur(6px);
    animation: fadeUp 0.5s ease both;
    transition: opacity 0.3s, transform 0.3s;
  }

  .q-number {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--pitch);
    margin-bottom: 14px;
    font-weight: 500;
  }

  .q-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    font-weight: 700;
    line-height: 1.45;
    color: var(--white);
    margin-bottom: 28px;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 12px; }

  .option-btn {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 15px 20px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 400;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .option-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }

  .option-btn:hover:not(:disabled)::before {
    background: rgba(255,255,255,0.04);
  }

  .option-btn:hover:not(:disabled) {
    border-color: rgba(200,169,110,0.45);
    transform: translateX(4px);
  }

  .opt-letter {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .option-btn.correct {
    background: rgba(74,156,107,0.2);
    border-color: var(--green-light);
    transform: translateX(0);
  }
  .option-btn.correct .opt-letter {
    background: var(--green-light);
    border-color: var(--green-light);
    color: white;
  }

  .option-btn.wrong {
    background: rgba(192,57,43,0.15);
    border-color: var(--red-bright);
  }
  .option-btn.wrong .opt-letter {
    background: var(--red-bright);
    border-color: var(--red-bright);
    color: white;
  }

  .option-btn:disabled { cursor: default; }

  /* Feedback */
  .feedback {
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.5;
    display: none;
    animation: fadeUp 0.3s ease;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: rgba(74,156,107,0.15); border-left: 3px solid var(--green-light); color: rgba(255,255,255,0.85); }
  .feedback.wrong-fb { background: rgba(192,57,43,0.12); border-left: 3px solid var(--red-bright); color: rgba(255,255,255,0.85); }

  /* Next button */
  .next-btn {
    width: 100%;
    background: var(--pitch);
    color: var(--ink);
    border: none;
    border-radius: 8px;
    padding: 16px 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.5px;
    cursor: pointer;
    margin-top: 20px;
    display: none;
    transition: all 0.2s ease;
    animation: fadeUp 0.3s ease;
  }
  .next-btn:hover { background: #d4b57a; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(200,169,110,0.3); }
  .next-btn.show { display: block; }

  /* Result screen */
  #result-screen {
    display: none;
    text-align: center;
    animation: fadeUp 0.6s ease both;
  }

  .result-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 52px 40px;
    backdrop-filter: blur(6px);
  }

  .result-icon {
    font-size: 56px;
    margin-bottom: 20px;
  }

  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--pitch);
    margin-bottom: 10px;
  }

  .result-score-big {
    font-family: 'Playfair Display', serif;
    font-size: 4.5rem;
    font-weight: 900;
    line-height: 1;
    margin: 24px 0 8px;
    color: var(--white);
  }

  .result-score-big span { color: var(--pitch); }

  .result-label {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 32px;
  }

  .result-message {
    font-size: 16px;
    color: rgba(255,255,255,0.7);
    line-height: 1.6;
    max-width: 420px;
    margin: 0 auto 36px;
  }

  .restart-btn {
    background: transparent;
    border: 1.5px solid var(--pitch);
    color: var(--pitch);
    border-radius: 8px;
    padding: 14px 36px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
  }
  .restart-btn:hover { background: var(--pitch); color: var(--ink); }

  /* Summary row */
  .answer-summary {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin: 24px 0 32px;
  }
  .dot {
    width: 14px; height: 14px;
    border-radius: 50%;
  }
  .dot.c { background: var(--green-light); }
  .dot.w { background: var(--red-bright); }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 520px) {
    .question-card { padding: 24px 20px 20px; }
    .q-text { font-size: 1.15rem; }
    h1 { font-size: 2.1rem; }
    .result-score-big { font-size: 3.5rem; }
  }
</style>
</head>
<body>

<div class="ball-deco"></div>
<div class="ball-deco"></div>

<div class="container">

  <header>
    <div class="badge">🏏 Test Your Knowledge</div>
    <h1>Cricket <span>Quiz</span></h1>
    <p class="subtitle">10 questions · Basic to Intermediate · No time limit</p>
  </header>

  <div id="quiz-screen">
    <div class="scoreboard">
      <div class="score-item">
        <div class="score-label">Question</div>
        <div class="score-value" id="q-counter">1/10</div>
      </div>
      <div class="score-divider"></div>
      <div class="score-item">
        <div class="score-label">Correct</div>
        <div class="score-value" id="correct-count">0</div>
      </div>
      <div class="score-divider"></div>
      <div class="score-item">
        <div class="score-label">Wrong</div>
        <div class="score-value" id="wrong-count">0</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="question-card" id="question-card">
      <div class="q-number" id="q-number">Question 1 of 10</div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question →</button>
  </div>

  <div id="result-screen">
    <div class="result-card">
      <div class="result-icon" id="result-icon"></div>
      <div class="result-title" id="result-title"></div>
      <div class="result-score-big" id="result-score"></div>
      <div class="result-label">out of 10 correct</div>
      <div class="answer-summary" id="answer-summary"></div>
      <p class="result-message" id="result-message"></p>
      <button class="restart-btn" onclick="restartQuiz()">Play Again</button>
    </div>
  </div>

</div>

<script>
const allQuestions = [
  {
    q: "How many players are there in a cricket team?",
    options: ["9", "10", "11", "12"],
    answer: 2,
    fact: "A cricket team has 11 players. At any time, 2 batters are at the crease while 11 fielders (including the bowler) defend."
  },
  {
    q: "How many deliveries make up one over in cricket?",
    options: ["4", "5", "6", "8"],
    answer: 2,
    fact: "An over consists of 6 legal deliveries bowled by the same bowler from the same end of the pitch."
  },
  {
    q: "What is the term for scoring 100 runs in a single innings by one batter?",
    options: ["Half-century", "Century", "Double", "Grand slam"],
    answer: 1,
    fact: "A century (or hundred) is one of cricket's most celebrated milestones. Scoring 50 runs is called a half-century."
  },
  {
    q: "Which country won the inaugural ICC Cricket World Cup in 1975?",
    options: ["Australia", "England", "West Indies", "India"],
    answer: 2,
    fact: "The West Indies won the first two Cricket World Cups in 1975 and 1979, captained by Clive Lloyd."
  },
  {
    q: "What does 'LBW' stand for in cricket?",
    options: ["Left Behind Wicket", "Leg Before Wicket", "Lower Body Wicket", "Line Before Wicket"],
    answer: 1,
    fact: "Leg Before Wicket (LBW) is a dismissal where the ball hits the batter's body (usually leg) instead of the bat, and the umpire judges it would have hit the stumps."
  },
  {
    q: "A batter is dismissed without scoring any runs. What is this called?",
    options: ["Blank", "Duck", "Nil", "Zero"],
    answer: 1,
    fact: "Getting out for 0 is called a 'duck'. Getting out for 0 on the very first ball faced is a 'golden duck'."
  },
  {
    q: "Which format of cricket is the longest, typically lasting up to 5 days?",
    options: ["T20", "One Day International", "Test Match", "The Hundred"],
    answer: 2,
    fact: "Test cricket is the oldest and longest form of the game, played over up to 5 days with each team getting two innings."
  },
  {
    q: "What is the name of the famous cricket ground in London, often called the 'Home of Cricket'?",
    options: ["The Oval", "Lord's", "Edgbaston", "Headingley"],
    answer: 1,
    fact: "Lord's Cricket Ground in St John's Wood, London, is owned by Marylebone Cricket Club (MCC) and is widely considered the spiritual home of cricket."
  },
  {
    q: "How many stumps make up a set of wickets at each end of the pitch?",
    options: ["2", "3", "4", "5"],
    answer: 1,
    fact: "There are 3 stumps (off, middle, and leg) with 2 bails resting on top to form a wicket. The stumps are 28 inches tall."
  },
  {
    q: "What term describes a bowler taking 3 wickets in 3 consecutive deliveries?",
    options: ["Triple strike", "Hat-trick", "Perfect over", "Golden delivery"],
    answer: 1,
    fact: "A hat-trick is one of cricket's rarest feats. The term originated because the bowler was traditionally awarded a hat for this achievement."
  },
  {
    q: "In Test cricket, how many balls are typically used before it must be replaced?",
    options: ["60 overs", "80 overs", "100 overs", "50 overs"],
    answer: 1,
    fact: "In Test cricket, a new ball is taken every 80 overs. Teams can choose to take the new ball as it is harder and tends to swing and seam more."
  },
  {
    q: "What is the maximum score a batter can score off a single delivery without any overthrows?",
    options: ["4", "6", "8", "10"],
    answer: 1,
    fact: "A six is scored when the ball crosses the boundary rope without touching the ground. It's the maximum a batter can score off a single legal delivery."
  },
  {
    q: "Which Indian batter is known as the 'God of Cricket' and holds the record for most international centuries?",
    options: ["Rahul Dravid", "Virat Kohli", "Sourav Ganguly", "Sachin Tendulkar"],
    answer: 3,
    fact: "Sachin Tendulkar scored 100 international centuries — 51 in Tests and 49 in ODIs — a record that may never be broken."
  },
  {
    q: "What happens when the ball reaches the boundary rope along the ground?",
    options: ["2 runs", "4 runs", "6 runs", "3 runs"],
    answer: 1,
    fact: "When the ball rolls or bounces to the boundary, 4 runs are automatically added to the batter's score, regardless of how many times they ran between wickets."
  },
  {
    q: "Which type of bowler delivers the ball with a spinning action to make it turn off the pitch?",
    options: ["Fast bowler", "Medium pacer", "Spinner", "Swing bowler"],
    answer: 2,
    fact: "Spinners (off-spin, leg-spin) use finger or wrist action to impart revolutions on the ball, causing it to deviate off the pitch — unlike fast bowlers who rely on pace."
  }
];

let questions = [];
let current = 0;
let score = 0;
let wrong = 0;
let answered = false;
let results = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initQuiz() {
  questions = shuffle(allQuestions).slice(0, 10);
  current = 0; score = 0; wrong = 0; answered = false; results = [];
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('correct-count').textContent = '0';
  document.getElementById('wrong-count').textContent = '0';
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = questions[current];
  const letters = ['A', 'B', 'C', 'D'];

  document.getElementById('q-number').textContent = `Question ${current + 1} of 10`;
  document.getElementById('q-counter').textContent = `${current + 1}/10`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('progress-fill').style.width = `${(current / 10) * 100}%`;

  const feedback = document.getElementById('feedback');
  feedback.className = 'feedback';
  feedback.textContent = '';

  const nextBtn = document.getElementById('next-btn');
  nextBtn.className = 'next-btn';
  nextBtn.textContent = current === 9 ? 'See Results 🏏' : 'Next Question →';

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(i);
    optionsEl.appendChild(btn);
  });

  // Animate card
  const card = document.getElementById('question-card');
  card.style.opacity = '0';
  card.style.transform = 'translateY(12px)';
  setTimeout(() => {
    card.style.transition = 'opacity 0.35s, transform 0.35s';
    card.style.opacity = '1';
    card.style.transform = 'translateY(0)';
  }, 50);
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const btns = document.querySelectorAll('.option-btn');
  const feedback = document.getElementById('feedback');

  btns.forEach(b => b.disabled = true);

  if (idx === q.answer) {
    btns[idx].classList.add('correct');
    score++;
    results.push('c');
    document.getElementById('correct-count').textContent = score;
    feedback.className = 'feedback correct-fb show';
    feedback.innerHTML = `✅ <strong>Correct!</strong> ${q.fact}`;
  } else {
    btns[idx].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    wrong++;
    results.push('w');
    document.getElementById('wrong-count').textContent = wrong;
    feedback.className = 'feedback wrong-fb show';
    feedback.innerHTML = `❌ <strong>Wrong.</strong> The correct answer was <strong>${q.options[q.answer]}</strong>. ${q.fact}`;
  }

  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  current++;
  if (current >= 10) {
    showResult();
  } else {
    loadQuestion();
  }
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('progress-fill').style.width = '100%';

  const pct = (score / 10) * 100;

  let icon, title, message;
  if (score === 10) { icon = '🏆'; title = 'Legendary!'; message = "A perfect score! You've clearly spent many hours watching — or playing — cricket. Absolute cricket maestro."; }
  else if (score >= 8) { icon = '🏅'; title = 'Outstanding!'; message = "Excellent knowledge of the game. You know your cricket inside out. Just a couple of stumbles away from perfection."; }
  else if (score >= 6) { icon = '🎯'; title = 'Well Played!'; message = "Solid cricket knowledge — you know the basics and then some. A few more matches to watch and you'll be scoring centuries."; }
  else if (score >= 4) { icon = '🏏'; title = 'Getting There'; message = "You've got the foundations. Keep watching more cricket and you'll be quizzing others in no time."; }
  else { icon = '📖'; title = 'Room to Grow'; message = "Every great fan starts somewhere! Cricket is a wonderfully deep game — explore it more and come back for a rematch."; }

  document.getElementById('result-icon').textContent = icon;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-score').innerHTML = `${score}<span>/10</span>`;
  document.getElementById('result-message').textContent = message;

  const summary = document.getElementById('answer-summary');
  summary.innerHTML = results.map(r => `<div class="dot ${r}"></div>`).join('');
}

function restartQuiz() {
  initQuiz();
}

// Start
initQuiz();
</script>
</body>
</html>
